info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{api_url}}auth/login"
  body:
    type: json
    data: |-
      {
        "email":"admin@teste.com",
        "password": "123456"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        bru.setGlobalEnvVar("auth_token", data.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  # Login

  Autentica um usuario e salva o JWT retornado em `auth_token`.

  ## Respostas esperadas
  - `200`: credenciais validas e conta ativa. Retorna `token` e `email`.
  - `401`: email/senha invalidos.
  - `403`: conta pendente, rejeitada ou desativada.

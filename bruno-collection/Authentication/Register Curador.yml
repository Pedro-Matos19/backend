info:
  name: Register Curador
  type: http
  seq: 4

http:
  method: POST
  url: "{{api_url}}auth/register/curador"
  auth: inherit
  body:
    type: json
    data: |-
      {
        "name":"curador teste",
        "email":"curador.teste@teste.com",
        "password":"123456"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  # Register Curador

  Cria uma conta de curador.

  ## Regras
  - Requer token Bearer de usuario `ADMIN`.
  - Cria usuario com role `CURADOR`.
  - A conta nasce com status `ACTIVE`.
  - Email duplicado retorna `409`.

docs: |-
  # User

  Endpoints de consulta de usuarios fora do painel administrativo.

  ## Endpoints
  - `GET /user/find-by-email?email={email}`: busca um usuario por email.

  A busca por email exige token Bearer de usuario `ADMIN` ou `CURADOR`.

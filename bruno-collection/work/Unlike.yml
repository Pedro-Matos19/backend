info:
  name: Unlike
  type: http
  seq: 10

http:
  method: DELETE
  url: "{{api_url}}work/{{work_id}}/like"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  # Unlike Work

  Remove a curtida da obra para o usuario autenticado.

  ## Comportamento
  - Requer `Authorization: Bearer <token>`.
  - A resposta retorna `liked: false` e o `likeCount` atual.

  ## Respostas esperadas
  - `200`: curtida removida.
  - `401`: usuario nao autenticado.
  - `404`: obra nao encontrada.

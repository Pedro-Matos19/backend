docs: |-
  # Create Cordel

  Cria uma obra do tipo cordel. Requer usuario autenticado com perfil
  `ADMIN` ou `CURADOR`.

  ## Regras importantes
  - `artName` e opcional.
  - Quando `artName` for enviado, ele precisa ser o titulo de uma arte existente.
  - O mesmo autor nao pode ter duas obras com o mesmo `title`.

  ## Respostas esperadas
  - `201`: cordel criado.
  - `404`: autor nao encontrado ou `artName` informado nao existe.
  - `409`: ja existe obra com o mesmo autor e titulo.

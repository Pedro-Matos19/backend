info:
  name: remove like
  type: http
  seq: 6

http:
  method: DELETE
  url: "{{api_url}}work/{{work_id}}/comments/{{comment_id}}/like"
  auth: inherit

runtime:
  variables:
    - name: comment_id
      value: c8000003-0000-0000-0000-000000000002

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  # Unlike Comment

  Remove a curtida do comentario para o usuario autenticado.

  ## Comportamento
  - Requer `Authorization: Bearer <token>`.
  - A resposta retorna `liked: false` e o `likeCount` atual.

  ## Respostas esperadas
  - `200`: curtida removida.
  - `401`: usuario nao autenticado.
  - `404`: comentario nao encontrado.
